<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Santoral Diario en Chile</title>

  <link rel="stylesheet" href="styles.css">

  <script src="santoral.js"></script>
  <script defer src="script.js"></script>
</head>

<body>

<header>
  <h1>Santoral Diario en Chile</h1>
  <button id="toggleModo" onclick="toggleModoOscuro()">🌙</button>
</header>

<main>

  <!-- SANTORAL DEL DÍA -->
  <section id="santoral-dia">
    <h2 id="fechaHoy"></h2>
    <p id="santoralHoy">Cargando el santoral del día...</p>
  </section>

  <!-- BUSCAR POR FECHA -->
  <section id="buscador">
    <h2>Buscar por fecha</h2>
    <input type="date" id="fechaSelector">
    <button onclick="mostrarSantoralPorFecha()">Buscar</button>
    <p id="santoralFechaSeleccionada"></p>
  </section>

  <!-- BUSCAR POR NOMBRE -->
  <section id="busquedaNombre">
    <h2>Buscar santo</h2>
    <input type="text" id="nombreSanto" placeholder="Ej: Juan">
    <button onclick="buscarSanto()">Buscar</button>
    <ul id="resultadosBusqueda"></ul>
  </section>

  <!-- CALENDARIO -->
  <section id="calendario">
    <h2>Calendario Anual</h2>
    <div class="calendario">
      <a href="mes.html?mes=1">Enero</a>
      <a href="mes.html?mes=2">Febrero</a>
      <a href="mes.html?mes=3">Marzo</a>
      <a href="mes.html?mes=4">Abril</a>
      <a href="mes.html?mes=5">Mayo</a>
      <a href="mes.html?mes=6">Junio</a>
      <a href="mes.html?mes=7">Julio</a>
      <a href="mes.html?mes=8">Agosto</a>
      <a href="mes.html?mes=9">Septiembre</a>
      <a href="mes.html?mes=10">Octubre</a>
      <a href="mes.html?mes=11">Noviembre</a>
      <a href="mes.html?mes=12">Diciembre</a>
    </div>
  </section>

</main>

<footer>
  <p>&copy; <span id="anioActual"></span> Santoral Diario en Chile</p>
</footer>

</body>
        </html>
